<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Buscar | TourPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="page-header">
    <div class="container">
        <h1>🔍 Buscar lugares</h1>
        <form th:action="@{/search}" method="get" style="margin-top:20px;">
            <div class="city-search" style="max-width:500px;">
                <i class="fas fa-search" style="color:var(--gray-400);"></i>
                <input type="text" name="q" th:value="${query}" placeholder="Busca restaurantes, museos, hoteles..." autocomplete="off"/>
                <button type="submit" class="city-search-btn"><i class="fas fa-search"></i> Buscar</button>
            </div>
        </form>
        <div class="filter-bar" style="margin-top:18px;">
            <a th:href="@{/search}" class="filter-chip">Todos</a>
            <a th:each="cat : ${categories}"
               th:href="@{/search(category=${cat.toString()})}"
               th:classappend="${selectedCategory == cat.toString()} ? ' active' : ''"
               th:text="${cat.emoji + ' ' + cat.displayName}"
               class="filter-chip"></a>
        </div>
    </div>
</div>
<section class="section">
    <div class="container">
        <p style="margin-bottom:24px; color:var(--gray-600);" th:if="${query != null}">
            <strong th:text="${places.size()}">0</strong> resultado(s) para "<span th:text="${query}"></span>"
        </p>
        <div th:if="${places.isEmpty()}" class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>No encontramos resultados</h3>
            <p>Intenta con otra búsqueda o explora por ciudades</p>
            <a th:href="@{/explore}" class="btn btn-blue">Explorar ciudades</a>
        </div>
        <div th:unless="${places.isEmpty()}" class="places-grid">
            <div th:each="place : ${places}" class="place-card">
                <div class="place-card-img-wrap">
                    <img th:src="${place.mainImage != null ? place.mainImage : 'https://images.unsplash.com/photo-1488085061387-422e29b40080?w=600'}"
                         th:alt="${place.name}" class="place-card-img" loading="lazy"/>
                    <span class="badge-cat" th:text="${place.category.emoji + ' ' + place.category.displayName}"></span>
                    <span th:if="${place.featured}" class="badge-featured">⭐</span>
                </div>
                <div class="place-card-body">
                    <div class="place-card-city"><i class="fas fa-map-marker-alt"></i> <span th:text="${place.cityName + ', ' + place.countryName}"></span></div>
                    <h3 class="place-card-name" th:text="${place.name}">Nombre</h3>
                    <p class="place-card-desc" th:text="${#strings.abbreviate(place.description, 90)}"></p>
                    <div class="place-card-footer">
                        <div class="rating" th:if="${place.totalReviews > 0}">
                            <span class="rating-star">★</span>
                            <strong th:text="${#numbers.formatDecimal(place.averageRating,1,1)}">4.5</strong>
                        </div>
                        <a th:href="@{/places/{id}(id=${place.id})}" class="btn-see">Ver más</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
