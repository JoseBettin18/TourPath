<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Ciudades | TourPath Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" th:href="@{/css/main.css}"/>
<link rel="stylesheet" th:href="@{/css/admin.css}"/></head>
<body class="admin-body">
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-wrap"><div class="sidebar-logo">✈️</div><span class="sidebar-brand-name">Tour<span>Path</span></span></div><div class="sidebar-role">Super Administrador</div></div>
    <nav class="sidebar-nav">
      <a th:href="@{/superadmin/dashboard}" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a th:href="@{/superadmin/requests}"  class="sidebar-link"><i class="fas fa-inbox"></i> Solicitudes</a>
      <a th:href="@{/superadmin/cities}"    class="sidebar-link active"><i class="fas fa-city"></i> Ciudades</a>
      <a th:href="@{/superadmin/places}"    class="sidebar-link"><i class="fas fa-map-marker-alt"></i> Lugares</a>
      <a th:href="@{/superadmin/users}"     class="sidebar-link"><i class="fas fa-users"></i> Usuarios</a>
      <hr class="sidebar-divider"/>
      <a th:href="@{/home}" class="sidebar-link"><i class="fas fa-globe"></i> Ver TourPath</a>
      <a th:href="@{/auth/logout}" class="sidebar-link logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">🌍 Gestión de Ciudades</h1>
      <a th:href="@{/superadmin/cities/new}" class="btn btn-primary"><i class="fas fa-plus"></i> Nueva ciudad</a>
    </div>
    <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>
    <div class="admin-section">
      <div class="table-search"><input type="text" id="tableSearch" placeholder="Buscar ciudad..."/><span id="searchCounter" style="font-size:.82rem;color:var(--gray-400);"></span></div>
      <div class="table-wrap">
        <table class="admin-table">
          <thead><tr><th>Bandera</th><th>Nombre</th><th>País</th><th>Continente</th><th>Lugares</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody>
            <tr th:each="city : ${cities}">
              <td style="font-size:1.5rem;" th:text="${city.flagEmoji}">🌍</td>
              <td><strong th:text="${city.name}">Ciudad</strong></td>
              <td th:text="${city.country}">País</td>
              <td th:text="${city.continent}">Continente</td>
              <td><span class="badge badge-cat" th:text="${city.totalPlaces + ' lugares'}">0</span></td>
              <td><span th:classappend="${city.active} ? 'badge-active' : 'badge-inactive'" class="badge" th:text="${city.active ? 'Activa' : 'Inactiva'}">Estado</span></td>
              <td class="actions-cell">
                <a th:href="@{/superadmin/cities/{id}/edit(id=${city.id})}" class="action-btn edit"><i class="fas fa-edit"></i></a>
                <a th:href="@{/city/{id}(id=${city.id})}" target="_blank" class="action-btn view"><i class="fas fa-eye"></i></a>
                <form th:action="@{/superadmin/cities/{id}/delete(id=${city.id})}" method="post" style="display:inline;" onsubmit="return confirm('Eliminar ciudad?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="action-btn delete"><i class="fas fa-trash"></i></button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body></html>
