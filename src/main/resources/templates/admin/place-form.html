<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Lugar | TourPath Admin</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>

<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-wrap">
          <div class="sidebar-logo">✈️</div><span class="sidebar-brand-name">Tour<span>Path</span></span>
        </div>
        <div class="sidebar-role">Super Admin</div>
      </div>
      <nav class="sidebar-nav">
        <a th:href="@{/superadmin/dashboard}" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a th:href="@{/superadmin/places}" class="sidebar-link active"><i class="fas fa-map-marker-alt"></i> Lugares</a>
        <a th:href="@{/superadmin/cities}" class="sidebar-link"><i class="fas fa-city"></i> Ciudades</a>
        <a th:href="@{/auth/logout}" class="sidebar-link logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" th:text="'📍 ' + ${action} + ' Lugar'">Lugar</h1>
        <a th:href="@{/superadmin/places}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Volver</a>
      </div>
      <div class="form-card">
        <form th:action="${place.id != null ? '/superadmin/places/' + place.id + '/edit' : '/superadmin/places/new'}"
          th:object="${place}" method="post" style="display:flex;flex-direction:column;gap:18px;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <div class="form-row">
            <div class="form-group"><label>Nombre *</label><input type="text" th:field="*{name}" class="form-input"
                required /><span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span>
            </div>
            <div class="form-group"><label>Categoría *</label>
              <select th:field="*{category}" class="form-input" required>
                <option value="">-- Selecciona --</option>
                <option th:each="cat : ${categories}" th:value="${cat.toString()}"
                  th:text="${cat.emoji + ' ' + cat.displayName}"></option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>Descripción *</label><textarea th:field="*{description}" rows="4"
              class="form-input" required></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Ciudad *</label>
              <select th:field="*{cityId}" class="form-input" required onchange="setCityName(this)">
                <option value="">-- Selecciona ciudad --</option>
                <option th:each="city : ${cities}" th:value="${city.id}"
                  th:text="${city.flagEmoji + ' ' + city.name + ', ' + city.country}"
                  th:attr="data-name=${city.name},data-country=${city.country}"></option>
              </select>
              <input type="hidden" th:field="*{cityName}" id="hCityName" />
              <input type="hidden" th:field="*{countryName}" id="hCountry" />
            </div>
            <div class="form-group"><label>Dirección</label><input type="text" th:field="*{address}"
                class="form-input" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Teléfono</label><input type="text" th:field="*{phone}" class="form-input" />
            </div>
            <div class="form-group"><label>Email</label><input type="email" th:field="*{email}" class="form-input" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Sitio web</label><input type="url" th:field="*{website}"
                class="form-input" /></div>
            <div class="form-group"><label>Precio</label>
              <select th:field="*{priceRange}" class="form-input">
                <option value="">Sin especificar</option>
                <option value="$">$ Económico</option>
                <option value="$$">$$ Moderado</option>
                <option value="$$$">$$$ Premium</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>URL de reservas</label><input type="url" th:field="*{bookingUrl}"
                class="form-input" placeholder="https://..." /></div>
            <div class="form-group"><label>Texto botón reserva</label><input type="text" th:field="*{bookingLabel}"
                class="form-input" placeholder="Reservar ahora" /></div>
          </div>
          <div class="form-group"><label>Horario</label><input type="text" th:field="*{openingHours}"
              class="form-input" /></div>
          <div class="form-group"><label>URL Imagen</label><input type="url" th:field="*{mainImage}" id="imageUrl"
              class="form-input" oninput="document.getElementById('imgPreview').src=this.value" /><img id="imgPreview"
              th:src="${place.mainImage}"
              style="margin-top:10px;width:100%;max-height:180px;object-fit:cover;border-radius:10px;"
              th:style="${place.mainImage != null} ? '' : 'display:none'" /></div>
          <div style="display:flex;gap:12px;">
            <label
              style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;border:1px solid var(--gray-200);border-radius:10px;"><input
                type="checkbox" th:field="*{featured}" /> Destacado</label>
            <label
              style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;border:1px solid var(--gray-200);border-radius:10px;"><input
                type="checkbox" th:field="*{active}" /> Activo</label>
          </div>
          <div style="display:flex;gap:12px;">
            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Guardar</button>
            <a th:href="@{/superadmin/places}" class="btn btn-outline btn-lg">Cancelar</a>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script th:src="@{/js/main.js}"></script>
  <script>function setCityName(sel) { const o = sel.options[sel.selectedIndex]; document.getElementById('hCityName').value = o.getAttribute('data-name') || ''; document.getElementById('hCountry').value = o.getAttribute('data-country') || ''; }</script>
</body>

</html>
