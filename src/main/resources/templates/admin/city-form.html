<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Ciudad | TourPath Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" th:href="@{/css/main.css}"/>
<link rel="stylesheet" th:href="@{/css/admin.css}"/></head>
<body class="admin-body">
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-wrap"><div class="sidebar-logo">✈️</div><span class="sidebar-brand-name">Tour<span>Path</span></span></div><div class="sidebar-role">Super Administrador</div></div>
    <nav class="sidebar-nav">
      <a th:href="@{/superadmin/dashboard}" class="sidebar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a th:href="@{/superadmin/cities}" class="sidebar-link active"><i class="fas fa-city"></i> Ciudades</a>
      <a th:href="@{/superadmin/places}" class="sidebar-link"><i class="fas fa-map-marker-alt"></i> Lugares</a>
      <a th:href="@{/superadmin/users}"  class="sidebar-link"><i class="fas fa-users"></i> Usuarios</a>
      <hr class="sidebar-divider"/>
      <a th:href="@{/auth/logout}" class="sidebar-link logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title" th:text="'🌍 ' + ${action} + ' Ciudad'">Ciudad</h1>
      <a th:href="@{/superadmin/cities}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Volver</a>
    </div>
    <div class="form-card">
      <form th:action="${city.id != null ? '/superadmin/cities/' + city.id + '/edit' : '/superadmin/cities/new'}"
            th:object="${city}" method="post" style="display:flex;flex-direction:column;gap:18px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-row">
          <div class="form-group"><label>Nombre *</label><input type="text" th:field="*{name}" class="form-input" required/><span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span></div>
          <div class="form-group"><label>País *</label><input type="text" th:field="*{country}" class="form-input" required/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Código de país (CO, US, ES...)</label><input type="text" th:field="*{countryCode}" class="form-input" maxlength="3"/></div>
          <div class="form-group"><label>Continente</label>
            <select th:field="*{continent}" class="form-input">
              <option value="">-- Selecciona --</option>
              <option value="Europa">Europa</option>
              <option value="América del Sur">América del Sur</option>
              <option value="América del Norte">América del Norte</option>
              <option value="Asia">Asia</option>
              <option value="África">África</option>
              <option value="Oceanía">Oceanía</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Emoji bandera</label><input type="text" th:field="*{flagEmoji}" class="form-input" placeholder="🇨🇴"/></div>
          <div class="form-group"><label>URL Imagen principal</label><input type="url" th:field="*{mainImage}" class="form-input" placeholder="https://images.unsplash.com/..."/></div>
        </div>
        <div class="form-group"><label>Descripción</label><textarea th:field="*{description}" rows="4" class="form-input"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Latitud</label><input type="number" step="0.0001" th:field="*{latitude}" class="form-input"/></div>
          <div class="form-group"><label>Longitud</label><input type="number" step="0.0001" th:field="*{longitude}" class="form-input"/></div>
        </div>
        <div style="display:flex;gap:12px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;border:1px solid var(--gray-200);border-radius:10px;">
            <input type="checkbox" th:field="*{active}"/> Activa (visible en la plataforma)
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px;border:1px solid var(--gray-200);border-radius:10px;">
            <input type="checkbox" th:field="*{featured}"/> Destacada (aparece en el home)
          </label>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Guardar</button>
          <a th:href="@{/superadmin/cities}" class="btn btn-outline btn-lg">Cancelar</a>
        </div>
      </form>
    </div>
  </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body></html>
