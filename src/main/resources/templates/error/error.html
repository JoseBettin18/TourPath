<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Error | TourPath</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;900&family=Inter:wght@400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" th:href="@{/css/main.css}"/>
<style>
.err{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:linear-gradient(135deg,#0f2540,#1a3c5e);color:white;}
.err-code{font-family:'Sora',sans-serif;font-size:clamp(5rem,15vw,9rem);font-weight:900;color:rgba(255,255,255,.12);line-height:1;}
.err-icon{font-size:3.5rem;margin:8px 0 16px;}
.err-title{font-family:'Sora',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);margin-bottom:12px;}
.err-msg{color:rgba(255,255,255,.7);font-size:1rem;max-width:480px;margin:0 auto 32px;line-height:1.7;}
.err-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
</style></head>
<body><div class="err">
<div class="err-code" th:text="${errorCode != null ? errorCode : '500'}">500</div>
<div class="err-icon" th:switch="${errorCode}">
  <span th:case="'403'">🔒</span><span th:case="'404'">🧭</span><span th:case="*">⚠️</span>
</div>
<h1 class="err-title" th:text="${errorTitle != null ? errorTitle : 'Algo salió mal'}">Error</h1>
<p class="err-msg" th:text="${errorMessage != null ? errorMessage : 'Por favor intenta de nuevo.'}">Mensaje</p>
<div class="err-btns">
  <a th:href="@{/home}" class="btn btn-primary"><i class="fas fa-home"></i> Inicio</a>
  <a href="javascript:history.back()" class="btn btn-outline-white"><i class="fas fa-arrow-left"></i> Volver</a>
</div>
</div></body></html>
