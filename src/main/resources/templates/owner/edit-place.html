<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar establecimiento | TourPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-wrap"><div class="sidebar-logo">✈️</div><span class="sidebar-brand-name">Tour<span>Path</span></span></div>
            <div class="sidebar-role">Panel de Propietario</div>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/owner/dashboard}" class="sidebar-link"><i class="fas fa-chart-bar"></i> Mi dashboard</a>
            <a th:href="@{/owner/place/edit}" class="sidebar-link active"><i class="fas fa-edit"></i> Editar mi negocio</a>
            <hr class="sidebar-divider"/>
            <a th:href="@{/home}" class="sidebar-link"><i class="fas fa-globe"></i> Ver TourPath</a>
            <a th:href="@{/auth/logout}" class="sidebar-link logout"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
        </nav>
    </aside>
    <main class="admin-main">
        <div class="admin-topbar">
            <h1 class="admin-page-title">✏️ Editar mi establecimiento</h1>
            <a th:href="@{/owner/dashboard}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
        <div th:if="${error}" class="alert alert-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>

        <div class="form-card">
            <div class="alert alert-info" style="margin-bottom:24px;">
                <i class="fas fa-info-circle"></i>
                Solo puedes editar la información de tu propio establecimiento. Para cambios de ciudad o categoría, contacta al soporte.
            </div>
            <form th:action="@{/owner/place/edit}" th:object="${place}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{cityId}"/>
                <input type="hidden" th:field="*{cityName}"/>
                <input type="hidden" th:field="*{countryName}"/>
                <input type="hidden" th:field="*{ownerId}"/>
                <input type="hidden" th:field="*{ownerName}"/>

                <div style="display:flex; flex-direction:column; gap:18px;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre del establecimiento *</label>
                            <input type="text" th:field="*{name}" class="form-input" required/>
                            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span>
                        </div>
                        <div class="form-group">
                            <label>Categoría *</label>
                            <select th:field="*{category}" class="form-input" required>
                                <option th:each="cat : ${categories}" th:value="${cat.toString()}"
                                        th:text="${cat.emoji + ' ' + cat.displayName}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Descripción *</label>
                        <textarea th:field="*{description}" rows="5" class="form-input" required></textarea>
                        <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></span>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Dirección</label>
                            <input type="text" th:field="*{address}" class="form-input"/>
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="text" th:field="*{phone}" class="form-input"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Correo</label>
                            <input type="email" th:field="*{email}" class="form-input"/>
                        </div>
                        <div class="form-group">
                            <label>Sitio web</label>
                            <input type="url" th:field="*{website}" class="form-input"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Horario</label>
                            <input type="text" th:field="*{openingHours}" class="form-input"/>
                        </div>
                        <div class="form-group">
                            <label>Rango de precios</label>
                            <select th:field="*{priceRange}" class="form-input">
                                <option value="">Sin especificar</option>
                                <option value="$">$ Económico</option>
                                <option value="$$">$$ Moderado</option>
                                <option value="$$$">$$$ Premium</option>
                            </select>
                        </div>
                    </div>

                    <h3 style="font-size:1rem; color:var(--primary-dark); border-top:2px solid var(--gray-100); padding-top:16px;">📅 Link de reservas</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>URL de reservas</label>
                            <input type="url" th:field="*{bookingUrl}" class="form-input"
                                   placeholder="https://wa.me/57300... o https://reservas.tunegocio.com"/>
                        </div>
                        <div class="form-group">
                            <label>Texto del botón</label>
                            <input type="text" th:field="*{bookingLabel}" class="form-input"
                                   placeholder='Ej: "Reservar por WhatsApp"'/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>URL Imagen principal</label>
                        <input type="url" th:field="*{mainImage}" id="imageUrl" class="form-input" oninput="previewImg(this.value)"/>
                        <img id="imgPreview" th:src="${place.mainImage}" alt="Preview"
                             style="margin-top:10px; width:100%; max-height:200px; object-fit:cover; border-radius:10px; display:block;"/>
                    </div>

                    <div style="display:flex; gap:12px;">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Guardar cambios</button>
                        <a th:href="@{/owner/dashboard}" class="btn btn-outline btn-lg">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </main>
</div>
<script th:src="@{/js/main.js}"></script>
<script>
function previewImg(url) {
    const img = document.getElementById('imgPreview');
    img.src = url; img.style.display = url ? 'block' : 'none';
}
</script>
</body>
</html>
