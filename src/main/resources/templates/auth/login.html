<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión | TourPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-body">
<div class="auth-wrap">
    <div class="auth-visual">
        <div class="auth-visual-overlay"></div>
        <div class="auth-visual-content">
            <a th:href="@{/home}" class="auth-logo">
                <div class="auth-logo-box">✈️</div>
                <span class="auth-logo-text">Tour<span>Path</span></span>
            </a>
            <h2>Bienvenido de vuelta</h2>
            <p>Miles de destinos te esperan. Inicia sesión y sigue explorando el mundo.</p>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-form-wrap">
            <h1 class="auth-title">Iniciar sesión</h1>
            <p class="auth-subtitle">¿No tienes cuenta? <a th:href="@{/auth/register}">Regístrate gratis</a></p>

            <div th:if="${error}"   class="alert alert-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>
            <div th:if="${message}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${message}"></span></div>
            <div th:if="${param.error}" class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.</div>
            <div th:if="${param.logout}" class="alert alert-success"><i class="fas fa-check-circle"></i> Sesión cerrada correctamente.</div>
            <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>

            <form th:action="@{/auth/login}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Usuario</label>
                    <div class="input-wrap">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="username" placeholder="Tu nombre de usuario" class="form-input" required/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" id="pwd" placeholder="Tu contraseña" class="form-input" required/>
                        <button type="button" class="toggle-pwd" onclick="togglePwd('pwd')"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Iniciar sesión
                </button>
            </form>

            <div class="auth-hint" style="margin-top:20px;">
                <p style="margin-bottom:6px; font-weight:600;">🔐 Acceso Super Admin:</p>
                <code>usuario: superadmin | contraseña: TourPath2026@</code>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
