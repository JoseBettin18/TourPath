<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Crear cuenta | TourPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-body">
<div class="auth-wrap">
    <div class="auth-visual" style="background-image:url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=900');">
        <div class="auth-visual-overlay"></div>
        <div class="auth-visual-content">
            <a th:href="@{/home}" class="auth-logo">
                <div class="auth-logo-box">✈️</div>
                <span class="auth-logo-text">Tour<span>Path</span></span>
            </a>
            <h2>Únete a TourPath</h2>
            <p>Descubre, reserva y comparte experiencias únicas en todo el mundo.</p>
        </div>
    </div>
    <div class="auth-form-side">
        <div class="auth-form-wrap">
            <h1 class="auth-title">Crear cuenta</h1>
            <p class="auth-subtitle">¿Ya tienes cuenta? <a th:href="@{/auth/login}">Inicia sesión</a></p>

            <div th:if="${error}" class="alert alert-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>

            <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Nombre completo</label>
                    <div class="input-wrap">
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" th:field="*{fullName}" placeholder="Tu nombre completo" class="form-input"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'input-error' : ''"/>
                    </div>
                    <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="field-error"></span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Usuario</label>
                        <div class="input-wrap">
                            <i class="fas fa-at input-icon"></i>
                            <input type="text" th:field="*{username}" placeholder="usuario_unico" class="form-input"
                                   th:classappend="${#fields.hasErrors('username')} ? 'input-error' : ''"/>
                        </div>
                        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label>Teléfono (opcional)</label>
                        <div class="input-wrap">
                            <i class="fas fa-phone input-icon"></i>
                            <input type="text" th:field="*{phone}" placeholder="+57 300 000 0000" class="form-input"/>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" th:field="*{email}" placeholder="correo@ejemplo.com" class="form-input"
                               th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''"/>
                    </div>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Contraseña</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" th:field="*{password}" id="p1" placeholder="Mínimo 6 caracteres" class="form-input"
                                   th:classappend="${#fields.hasErrors('password')} ? 'input-error' : ''"/>
                            <button type="button" class="toggle-pwd" onclick="togglePwd('p1')"><i class="fas fa-eye"></i></button>
                        </div>
                        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label>Confirmar contraseña</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" th:field="*{confirmPassword}" id="p2" placeholder="Repite tu contraseña" class="form-input"/>
                            <button type="button" class="toggle-pwd" onclick="togglePwd('p2')"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg">
                    <i class="fas fa-user-plus"></i> Crear mi cuenta
                </button>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
