<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Mi perfil | TourPath</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
  <div th:replace="~{fragments/layout :: navbar}"></div>
  <div class="page-header">
    <div class="container">
      <h1>Mi Perfil</h1>
    </div>
  </div>
  <section class="section">
    <div class="container" style="max-width:500px;text-align:center;">
      <div style="background:white;border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);">
        <div
          style="width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:white;margin:0 auto 16px;font-family:'Sora',sans-serif;"
          th:text="${currentUsername != null ? #strings.substring(currentUsername,0,1).toUpperCase() : 'U'}">U</div>
        <h2 style="font-size:1.4rem;color:var(--primary-dark);" th:text="${currentUsername}">Usuario</h2>
        <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a th:href="@{/explore}" class="btn btn-blue">Explorar ciudades</a>
          <a th:href="@{/auth/logout}" class="btn btn-outline">Cerrar sesión</a>
        </div>
      </div>
    </div>
  </section>
  <div th:replace="~{fragments/layout :: footer}"></div>
  <script th:src="@{/js/main.js}"></script>
</body>

</html>
