<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Estado solicitud | TourPath</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" th:href="@{/css/main.css}"/></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="page-header"><div class="container"><h1>Estado de tu solicitud</h1></div></div>
<section class="section"><div class="container" style="max-width:560px;text-align:center;">
  <div style="background:white;border-radius:var(--radius);padding:48px;box-shadow:var(--shadow);">
    <div style="font-size:3rem;margin-bottom:16px;">⏳</div>
    <h2 style="font-size:1.5rem;color:var(--primary-dark);margin-bottom:12px;">Tu solicitud está en revisión</h2>
    <p style="color:var(--gray-600);line-height:1.7;margin-bottom:24px;">Recibirás un correo con el resultado en 2-3 días hábiles.</p>
    <a th:href="@{/home}" class="btn btn-blue">Ir al inicio</a>
  </div>
</div></section>
<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body></html>
